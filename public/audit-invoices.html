<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGF Invoice Audit — App Data Only (SGF1817+)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0C0D0E;color:#E8E8E9;font-family:Arial,sans-serif;padding:20px;line-height:1.5}
.container{max-width:1100px;margin:0 auto}
h1{color:#D4A843;font-size:22px;margin-bottom:5px}
h2{color:#D4A843;font-size:16px;margin-top:20px;margin-bottom:8px;border-bottom:1px solid #2A2B2C;padding-bottom:5px}
p{color:#8A8B8C;font-size:13px;margin-bottom:10px}
.card{background:#131415;border:1px solid #2A2B2C;border-radius:10px;padding:16px;margin-bottom:16px}
button{cursor:pointer;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:600;transition:opacity 0.2s}
button:hover{opacity:0.85}
.btn-primary{background:#D4A843;color:#0C0D0E;width:100%;margin-top:10px}
.btn-secondary{background:#2A2B2C;color:#E8E8E9;border:1px solid #3A3B3C;margin-top:10px}
table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
th{text-align:left;color:#D4A843;padding:5px 4px;border-bottom:1px solid #2A2B2C;font-size:10px;text-transform:uppercase;position:sticky;top:0;background:#131415}
td{padding:4px;border-bottom:1px solid #1A1B1C;vertical-align:top}
tr:hover td{background:#1A1B1C}
pre{background:#1A1B1C;border-radius:8px;padding:10px;font-family:monospace;font-size:11px;color:#8A8B8C;max-height:400px;overflow:auto;white-space:pre-wrap}
.status-ok{color:#4ADE80;font-weight:600}
.status-warn{color:#F59E0B;font-weight:600}
.status-error{color:#EF4444;font-weight:600}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600}
.badge-sample{background:rgba(245,158,11,0.15);color:#F59E0B}
.badge-order{background:rgba(74,222,128,0.15);color:#4ADE80}
.badge-sage{background:rgba(100,149,237,0.15);color:#6495ED}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:10px}
.summary-card{background:#1A1B1C;border-radius:8px;padding:12px;text-align:center}
.summary-card .number{font-size:24px;font-weight:700;color:#D4A843}
.summary-card .label{font-size:11px;color:#8A8B8C;margin-top:4px}
.scroll-table{max-height:300px;overflow:auto}
</style>
</head>
<body>
<div class="container">
<h1>App Data Audit (SGF1817 onwards)</h1>
<p>This checks ONLY the orders and invoices created by the app, starting from SGF1817. Sage imported historical data is excluded.</p>

<div class="card">
<button class="btn-primary" onclick="runAudit()">Run Audit</button>
<div id="results"></div>
</div>

</div>

<script>
const SGF_START = 1817; // App invoices start here

function isAppInvoice(inv) {
  // Only include SGF numbers >= 1817 (app-created)
  const match = (inv.invoiceNumber || '').match(/^SGF(\d+)$/);
  if (match) return parseInt(match[1]) >= SGF_START;
  // Also include SGF-SMP invoices (sample orders created by app)
  if ((inv.invoiceNumber || '').startsWith('SGF-SMP-')) return true;
  return false;
}

function isAppOrder(order) {
  // Only include orders created by the app (ORD- or SMP- prefix with recent dates)
  const orderNum = order.orderNumber || '';
  // Include all ORD- and SMP- orders (app created)
  if (orderNum.startsWith('ORD-') || orderNum.startsWith('SMP-')) return true;
  return false;
}

function runAudit() {
  const el = document.getElementById('results');
  el.innerHTML = '<p style="color:#D4A843">Running audit on app data only (SGF' + SGF_START + '+)...</p>';
  setTimeout(() => {
    try { performAudit(el); } catch (e) { el.innerHTML = '<p class="status-error">Error: ' + e.message + '</p>'; }
  }, 100);
}

function performAudit(el) {
  const allOrders = JSON.parse(localStorage.getItem('sgf_orders') || '[]');
  const allInvoices = JSON.parse(localStorage.getItem('sgf_invoices') || '[]');
  const customers = JSON.parse(localStorage.getItem('sgf_customers') || '[]');

  // Filter to app data only
  const orders = allOrders.filter(isAppOrder);
  const invoices = allInvoices.filter(isAppInvoice);

  const customerMap = {};
  customers.forEach(c => customerMap[c.id] = c.name || c.companyName || `Cust#${c.id}`);

  let html = '';

  // Summary
  html += '<div class="summary-grid">';
  html += `<div class="summary-card"><div class="number">${orders.length}</div><div class="label">App Orders</div></div>`;
  html += `<div class="summary-card"><div class="number">${invoices.length}</div><div class="label">App Invoices</div></div>`;

  // 1. Every order must have an invoice
  const orphanOrders = orders.filter(o => !invoices.find(i => i.orderId == o.id));
  html += `<div class="summary-card"><div class="number ${orphanOrders.length ? 'status-error' : 'status-ok'}">${orphanOrders.length}</div><div class="label">Orders Without Invoice</div></div>`;

  // 2. Every invoice must have an order
  const orphanInvoices = invoices.filter(i => !orders.find(o => o.id == i.orderId));
  html += `<div class="summary-card"><div class="number ${orphanInvoices.length ? 'status-warn' : 'status-ok'}">${orphanInvoices.length}</div><div class="label">Invoices Without Order</div></div>`;

  // 3. Duplicate invoice numbers
  const numMap = {};
  invoices.forEach(i => { const n = i.invoiceNumber; if (n) { numMap[n] = numMap[n] || 0; numMap[n]++; } });
  const dups = Object.entries(numMap).filter(([k, v]) => v > 1);
  html += `<div class="summary-card"><div class="number ${dups.length ? 'status-error' : 'status-ok'}">${dups.length}</div><div class="label">Duplicate Invoice #s</div></div>`;

  html += '</div>';

  // Helper to format date
  function fmtDate(iso) {
    if (!iso) return '-';
    try { return new Date(iso).toLocaleString('en-ZA', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }); } catch { return iso; }
  }

  // Section 1: Complete Order → Invoice Linkage
  html += '<h2>Order → Invoice → Picking Slip Linkage</h2>';
  html += '<div class="scroll-table"><table><thead><tr><th>Order #</th><th>Type</th><th>Customer</th><th>Invoice #</th><th>Order Status</th><th>Invoice Status</th><th>Picking Slip</th><th>Order Created</th><th>Invoice Created</th><th>Result</th></tr></thead><tbody>';

  const linked = [];
  orders.sort((a, b) => new Date(a.createdAt || 0) - new Date(b.createdAt || 0));
  orders.forEach(order => {
    const invoice = invoices.find(i => i.orderId == order.id);
    const isSample = order.orderNumber.startsWith('SMP-');
    const customer = customerMap[order.customerId] || `Cust#${order.customerId}`;

    if (invoice) {
      const hasProperSgf = invoice.invoiceNumber && invoice.invoiceNumber.match(/^SGF\d+$/) && parseInt(invoice.invoiceNumber.match(/^SGF(\d+)$/)[1]) >= SGF_START;
      const isSmpInvoice = (invoice.invoiceNumber || '').startsWith('SGF-SMP-');
      const hasPickingSlip = invoice.deliveryNoteNumber && invoice.deliveryNoteNumber !== 'NONE';
      let result = '<span class="status-ok">OK</span>';
      if (isSample && !isSmpInvoice && !hasProperSgf) result = '<span class="status-warn">SGF-SMP?</span>';
      else if (!hasPickingSlip) result = '<span class="status-warn">No DN</span>';

      html += `<tr>`;
      html += `<td>${order.orderNumber}</td>`;
      html += `<td>${isSample ? '<span class="badge badge-sample">Sample</span>' : '<span class="badge badge-order">Order</span>'}</td>`;
      html += `<td>${customer}</td>`;
      html += `<td>${invoice.invoiceNumber}</td>`;
      html += `<td>${order.status}</td>`;
      html += `<td>${invoice.status}</td>`;
      html += `<td>${hasPickingSlip ? invoice.deliveryNoteNumber : '<span class="status-error">Missing</span>'}</td>`;
      html += `<td>${fmtDate(order.createdAt)}</td>`;
      html += `<td>${fmtDate(invoice.createdAt)}</td>`;
      html += `<td>${result}</td>`;
      html += `</tr>`;

      linked.push({ order, invoice, customer, isSample, hasPickingSlip });
    } else {
      html += `<tr style="opacity:0.5">`;
      html += `<td>${order.orderNumber}</td>`;
      html += `<td>${isSample ? '<span class="badge badge-sample">Sample</span>' : '<span class="badge badge-order">Order</span>'}</td>`;
      html += `<td>${customer}</td>`;
      html += `<td class="status-error">NONE</td>`;
      html += `<td>${order.status}</td>`;
      html += `<td>-</td>`;
      html += `<td>-</td>`;
      html += `<td>${fmtDate(order.createdAt)}</td>`;
      html += `<td>-</td>`;
      html += `<td class="status-error">Orphan</td>`;
      html += `</tr>`;
    }
  });
  html += '</tbody></table></div>';

  // Section 2: Orphan Orders
  if (orphanOrders.length > 0) {
    html += '<h2>Orders Without Invoices</h2>';
    html += '<div class="scroll-table"><table><thead><tr><th>Order #</th><th>Customer</th><th>Status</th><th>Total</th><th>Order Created</th></tr></thead><tbody>';
    orphanOrders.sort((a, b) => new Date(a.createdAt || 0) - new Date(b.createdAt || 0));
    orphanOrders.forEach(o => {
      const customer = customerMap[o.customerId] || `Cust#${o.customerId}`;
      html += `<tr><td>${o.orderNumber}</td><td>${customer}</td><td>${o.status}</td><td>R ${(o.total || 0).toFixed(2)}</td><td>${fmtDate(o.createdAt)}</td></tr>`;
    });
    html += '</tbody></table></div>';
  }

  // Section 3: Orphan Invoices
  if (orphanInvoices.length > 0) {
    html += '<h2>Invoices Without Matching Orders</h2>';
    html += '<div class="scroll-table"><table><thead><tr><th>Invoice #</th><th>Customer</th><th>Status</th><th>Order ID</th><th>Invoice Created</th></tr></thead><tbody>';
    orphanInvoices.sort((a, b) => new Date(a.createdAt || 0) - new Date(b.createdAt || 0));
    orphanInvoices.forEach(i => {
      const customer = (i.customer?.name || i.customer?.companyName || `Cust#${i.customerId}`);
      html += `<tr><td>${i.invoiceNumber}</td><td>${customer}</td><td>${i.status}</td><td>${i.orderId}</td><td>${fmtDate(i.createdAt)}</td></tr>`;
    });
    html += '</tbody></table></div>';
  }

  // Section 4: Duplicate Invoice Numbers
  if (dups.length > 0) {
    html += '<h2>Duplicate Invoice Numbers</h2>';
    dups.forEach(([num, count]) => {
      const items = invoices.filter(i => i.invoiceNumber === num);
      html += `<p class="status-error">${num} appears ${count} times:</p>`;
      html += '<ul style="font-size:11px;color:#8A8B8C;margin-left:20px;margin-bottom:10px">';
      items.forEach(item => {
        const order = orders.find(o => o.id == item.orderId);
        html += `<li>Invoice ID ${item.id} → Order: ${order ? order.orderNumber : 'NO ORDER'} → Customer: ${item.customer?.name || item.customer?.companyName || 'Unknown'}</li>`;
      });
      html += '</ul>';
    });
  }

  // Section 5: Sample Order Invoice Check
  html += '<h2>Sample Orders (Must have SGF-SMP-XXX or proper SGF number)</h2>';
  const sampleOrders = orders.filter(o => o.orderNumber.startsWith('SMP-'));
  if (sampleOrders.length === 0) {
    html += '<p>No sample orders found.</p>';
  } else {
    html += '<div class="scroll-table"><table><thead><tr><th>Order #</th><th>Customer</th><th>Status</th><th>Invoice #</th><th>Order Created</th><th>Invoice Created</th><th>Result</th></tr></thead><tbody>';
    sampleOrders.sort((a, b) => new Date(a.createdAt || 0) - new Date(b.createdAt || 0));
    sampleOrders.forEach(order => {
      const invoice = invoices.find(i => i.orderId == order.id);
      const customer = customerMap[order.customerId] || `Cust#${order.customerId}`;
      const invNum = invoice ? invoice.invoiceNumber : 'NONE';
      const isProperSgf = invNum.match(/^SGF\d+$/) && parseInt(invNum.match(/^SGF(\d+)$/)[1]) >= SGF_START;
      const isSmpFormat = invNum.startsWith('SGF-SMP-');
      const ok = invoice && (isProperSgf || isSmpFormat);

      html += `<tr>`;
      html += `<td>${order.orderNumber}</td>`;
      html += `<td>${customer}</td>`;
      html += `<td>${order.status}</td>`;
      html += `<td>${invNum}</td>`;
      html += `<td>${fmtDate(order.createdAt)}</td>`;
      html += `<td>${fmtDate(invoice ? invoice.createdAt : null)}</td>`;
      html += `<td>${ok ? '<span class="status-ok">OK</span>' : (invoice ? '<span class="status-warn">Needs proper SGF</span>' : '<span class="status-error">No invoice</span>')}</td>`;
      html += `</tr>`;
    });
    html += '</tbody></table></div>';
  }

  // Section 6: SGF Sequence (app only)
  const sgfNums = invoices
    .map(i => ({ num: i.invoiceNumber, match: (i.invoiceNumber || '').match(/^SGF(\d+)$/) }))
    .filter(n => n.match)
    .map(n => parseInt(n.match[1]))
    .sort((a, b) => a - b);

  html += '<h2>SGF Number Sequence (App Only)</h2>';
  if (sgfNums.length > 0) {
    html += `<p>Lowest: <strong>SGF${sgfNums[0]}</strong> | Highest: <strong>SGF${sgfNums[sgfNums.length - 1]}</strong> | Total: <strong>${sgfNums.length}</strong></p>`;
    const gaps = [];
    for (let i = 1; i < sgfNums.length; i++) {
      if (sgfNums[i] - sgfNums[i - 1] > 1) {
        const missing = [];
        for (let m = sgfNums[i - 1] + 1; m < sgfNums[i]; m++) missing.push('SGF' + m);
        gaps.push({ from: 'SGF' + sgfNums[i - 1], to: 'SGF' + sgfNums[i], missing });
      }
    }
    if (gaps.length === 0) {
      html += '<p class="status-ok">No gaps in sequence.</p>';
    } else {
      html += `<p class="status-warn">${gaps.length} gap(s) found:</p>`;
      html += '<div class="scroll-table"><table><thead><tr><th>Gap</th><th>Missing</th></tr></thead><tbody>';
      gaps.forEach(g => {
        html += `<tr><td>${g.from} → ${g.to}</td><td>${g.missing.join(', ')}</td></tr>`;
      });
      html += '</tbody></table></div>';
    }
  }

  el.innerHTML = html;
}
</script>
</body>
</html>
