<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fix Missing Invoices</title>
<style>
body{font-family:Arial,sans-serif;font-size:10pt;padding:20px;background:#f5f5f5;max-width:800px;margin:0 auto}
.box{background:#fff;padding:15px;margin-bottom:15px;border-radius:6px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
h1{font-size:14pt;color:#1a1a1a}
table{width:100%;border-collapse:collapse;font-size:9pt;margin-top:10px}
th{background:#1a1a1a;color:#fff;padding:8px;text-align:left}
td{padding:6px 8px;border-bottom:1px solid #e5e5e5}
.ok{background:#c6f6d5}.missing{background:#fed7d7}
button{padding:10px 20px;border:none;border-radius:4px;font-size:10pt;font-weight:700;cursor:pointer;margin-right:8px}
.btn-go{background:#38a169;color:#fff}.btn-go:hover{background:#2f855a}
.btn-refresh{background:#718096;color:#fff}
.num{font-family:'Courier New',monospace}
</style>
</head>
<body>
<h1>Fix Missing Invoices</h1>
<div class="box">
<p>This tool finds orders without invoices and creates them with proper SGF numbers.</p>
<button class="btn-go" onclick="scan()">Scan for Missing Invoices</button>
<button class="btn-refresh" onclick="location.reload()">Refresh</button>
<div id="results"></div>
</div>
<script>
const orders=JSON.parse(localStorage.getItem('sgf_orders')||'[]');
const invoices=JSON.parse(localStorage.getItem('sgf_invoices')||'[]');
const customers=JSON.parse(localStorage.getItem('sgf_customers')||'[]');

function fmt(n){return 'R '+Number(n||0).toFixed(2)}

function scan(){
  const missing=[];
  orders.forEach(order=>{
    const hasInvoice=invoices.some(i=>i.orderId==order.id&&i.invoiceNumber&&i.invoiceNumber.startsWith('SGF'));
    if(!hasInvoice){
      missing.push(order);
    }
  });

  let html='<table><thead><tr><th>Order #</th><th>Customer</th><th>Total</th><th>Status</th></tr></thead><tbody>';
  missing.forEach(o=>{
    html+=`<tr class="missing"><td class="num">${o.orderNumber}</td><td>${o.customerName||'-'}</td><td>${fmt(o.total)}</td><td>NO INVOICE</td></tr>`;
  });
  html+='</tbody></table>';

  if(missing.length===0){
    html='<p style="color:#38a169;font-weight:700">All orders have SGF invoices! Nothing to fix.</p>';
  }else{
    html+=`<p><strong>${missing.length} orders missing invoices</strong></p>`;
    html+='<button class="btn-go" onclick="fixAll()">Generate All Missing Invoices</button>';
  }
  document.getElementById('results').innerHTML=html;
}

function getNextSGF(){
  let max=1800;
  invoices.forEach(i=>{
    const m=(i.invoiceNumber||'').match(/SGF(\d+)/);
    if(m){const n=parseInt(m[1]);if(n>max)max=n;}
  });
  return 'SGF'+String(max+1);
}

function fixAll(){
  const missing=orders.filter(o=>!invoices.some(i=>i.orderId==o.id&&i.invoiceNumber&&i.invoiceNumber.startsWith('SGF')));
  let nextNum=getNextSGF();
  const created=[];

  missing.forEach(order=>{
    const isSample=order.orderType==='sample'||order.orderNumber.startsWith('SMP-');
    const items=order.items||[];
    const subtotal=items.reduce((s,it)=>s+(it.lineTotal||0),0);
    const vat=isSample?0:subtotal*0.15;
    const total=isSample?0:subtotal+vat;
    const customer=customers.find(c=>c.id==order.customerId);

    const inv={
      id:Date.now()+Math.random(),
      orderId:order.id,
      orderNumber:order.orderNumber,
      invoiceNumber:nextNum,
      deliveryNoteNumber:`DN-${order.orderNumber}`,
      customerId:order.customerId,
      customer:customer||null,
      subtotal:isSample?0:subtotal,
      vatAmount:isSample?0:vat,
      total:isSample?0:total,
      totalAmount:isSample?0:total,
      balanceDue:isSample?0:total,
      amountPaid:isSample?0:0,
      status:isSample?'paid':'draft',
      paymentTerms:order.paymentTerms||'cod',
      invoiceDate:order.createdAt||new Date().toISOString(),
      dueDate:order.createdAt||new Date().toISOString(),
      notes:isSample?`Sample order - ${order.orderNumber} (No Charge)`:`Invoice for ${order.orderNumber}`,
      items:items.map(it=>({
        description:`${it.productCode} - ${it.productName}`,
        quantity:it.quantity,
        unitPrice:isSample?0:it.unitPrice,
        lineTotal:isSample?0:it.lineTotal
      })),
      createdAt:order.createdAt||new Date().toISOString(),
      updatedAt:new Date().toISOString()
    };

    invoices.push(inv);
    created.push({order:order.orderNumber,invoice:nextNum});

    // Increment SGF number
    const m=nextNum.match(/SGF(\d+)/);
    if(m) nextNum='SGF'+String(parseInt(m[1])+1);
  });

  // Save
  localStorage.setItem('sgf_invoices',JSON.stringify(invoices));

  // Show results
  let html='<h3>Invoices Created:</h3><table><thead><tr><th>Order</th><th>Invoice #</th></tr></thead><tbody>';
  created.forEach(c=>{
    html+=`<tr class="ok"><td class="num">${c.order}</td><td class="num">${c.invoice}</td></tr>`;
  });
  html+='</tbody></table>';
  html+=`<p style="color:#38a169;font-weight:700">${created.length} invoices created and saved!</p>`;
  html+='<p><strong>Next:</strong> Go to Settings and click "Push All Data to Cloud" to sync to Firebase.</p>';
  document.getElementById('results').innerHTML=html;
}
</script>
</body>
</html>
