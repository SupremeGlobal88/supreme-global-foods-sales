services:
  - type: web
    name: supreme-sales-command
    runtime: docker
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: APP_ID
        sync: false
      - key: APP_SECRET
        sync: false
      - key: KIMI_AUTH_URL
        sync: false
      - key: KIMI_OPEN_URL
        sync: false
      - key: OWNER_UNION_ID
        sync: false
    healthCheckPath: /api/health
